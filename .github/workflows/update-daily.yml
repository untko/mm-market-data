name: Update daily market data

on:
  schedule:
    # Daily at 08:00 Myanmar time (UTC+06:30).
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch daily fuel and cash FX data
        run: python update.py --topics cash-fx fuel

      - name: Commit updated data and dashboard
        run: |
          git config user.name "market-data-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ dashboard/market-trends.svg
          git diff --cached --quiet || git commit -m "chore(data): update daily market data $(date -u +'%Y-%m-%d')"
          git push
